spring.application.name=banquito-tariff-service
server.port=8086
grpc.server.port=${GRPC_SERVER_PORT:9090}

spring.datasource.url=${POSTGRES_URL:jdbc:mysql://localhost:3306/tariffdb?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${POSTGRES_USER:root}
spring.datasource.password=${POSTGRES_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
